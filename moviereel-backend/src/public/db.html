<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MovieReel — Database tools</title>
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#0e0c10; color:#f4ece0;
      display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { width:100%; max-width:460px; padding:36px; }
    h1 { font-size:28px; margin:0 0 4px; }
    .gold { color:#e0a93f; }
    p { color:#a59aaa; line-height:1.55; }
    button { font:inherit; font-weight:700; border:none; border-radius:10px; padding:13px 18px;
      cursor:pointer; width:100%; margin-top:12px; }
    .seed { background:#e0a93f; color:#1a1206; }
    .reset { background:transparent; color:#c8503f; border:1px solid rgba(200,80,63,.4); }
    pre { background:#16131b; border:1px solid rgba(244,236,224,.12); border-radius:10px;
      padding:14px; margin-top:18px; white-space:pre-wrap; font-size:13px; color:#a59aaa; min-height:24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Database <span class="gold">tools</span></h1>
    <p>Use these to reset the app to a known state while testing. Seeding inserts
       initial genres, users, movies and reviews.</p>
    <button class="seed" onclick="call('/api/db/seed')">Insert initial data (seed)</button>
    <button class="reset" onclick="call('/api/db/reset')">Delete ALL data (reset)</button>
    <pre id="out">Ready.</pre>
  </div>
  <script>
    async function call(url) {
      const out = document.getElementById('out');
      out.textContent = 'Working…';
      try {
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
